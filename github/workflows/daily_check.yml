name: Price Check
on:
  schedule:
    - cron: '0 8 * * *' # Set this to your preferred UTC time
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install & Run
        run: |
          pip install curl_cffi beautifulsoup4
          python your_script_name.py
